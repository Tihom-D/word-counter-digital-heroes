<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Word & Character Counter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: min-content;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #3498db;
        }
        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .dev-info {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
        }
        .hero-btn {
            display: inline-block;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .hero-btn:hover {
            background-color: #222;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Smart Word & Character Counter</h1>
        <textarea id="textInput" placeholder="Type or paste your text here to count words and characters..."></textarea>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="wordCount">0</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="charCount">0</div>
                <div class="stat-label">Characters</div>
            </div>
        </div>

        <div class="footer">
            <div class="dev-info">
                <strong>Developer:</strong> Mohit Nekhar <br>
                <strong>Email:</strong> mohtnekhar2@gmail.com
            </div>
            <a href="https://digitalheroesco.com" target="_blank" class="hero-btn">Built for Digital Heroes</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
